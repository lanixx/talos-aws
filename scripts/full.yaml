# =============================================================================
# Yaook OpenStack PoC – "KVM per Horizon-UI"
# =============================================================================
# ACHTUNG: Beispielcharakter. Nicht produktiv einsetzen. An Umgebung anpassen.
#
# Reihenfolge / Voraussetzungen:
#   1. cert-manager installiert
#   2. Yaook-Operator(en) installiert
#   3. Namespace-PodSecurity = privileged VOR dem Deploy (siehe unten – behebt
#      die FailedCreate/SYS_NICE/NET_ADMIN/hostPath-Fehler; muss stehen, BEVOR
#      der erste DB-Pod initialisiert, sonst safe_to_bootstrap-Falle)
#
# Storage: reines local-path. Glance nutzt File-Backend (kein Ceph). Cinder ist
# bewusst NICHT enthalten -> Instanzen booten ephemer (Image -> lokale Disk).
# Fuer "Volume anlegen / boot from volume" spaeter Ceph + Cinder nachruesten.
#
# Nach dem Rollout (kein CR, via CLI/Horizon):
#   - Admin-Creds:   yaookctl -n default cr credentials keystone keystone
#   - Glance-Image:  openstack image create ... (z.B. cirros)
#   - Flavor:        openstack flavor create m1.tiny --ram 512 --disk 1 --vcpus 1
#   - Provider-Netz: openstack network create --provider-physical-network physnet1 \
#                      --provider-network-type flat provider-net
#                    openstack subnet create ... (danach Instanz in Horizon booten)
# =============================================================================

# -----------------------------------------------------------------------------
# 0) PodSecurity-Fix  (NEU) – behebt alle FailedCreate-Events
# -----------------------------------------------------------------------------
# Talos erzwingt clusterweit PSA "baseline" (nur kube-system ausgenommen).
# Namespace-Labels haben Vorrang vor dem clusterweiten Default -> hier auf
# "privileged" heben. Yaook-Workloads (Galera=SYS_NICE, OVN=NET_ADMIN+hostPath,
# Nova-Compute=libvirt/KVM) brauchen privileged; das ist by design.
# 'kubectl apply' patcht die Labels in den bestehenden default-Namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
---
# -----------------------------------------------------------------------------
# 1) cert-manager: Self-signed CA + interner Issuer  (unverändert)
# -----------------------------------------------------------------------------
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: yaook-internal-ca
spec:
  isCA: true
  privateKey:
    rotationPolicy: Never
  commonName: yaook-internal-ca
  secretName: yaook-internal-ca
  issuerRef:
    name: selfsigned-issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: yaook-internal
spec:
  ca:
    secretName: yaook-internal-ca
---
# -----------------------------------------------------------------------------
# 2) Keystone  (unverändert)
# -----------------------------------------------------------------------------
apiVersion: yaook.cloud/v1
kind: KeystoneDeployment
metadata:
  name: keystone
  namespace: default
spec:
  database:
    replicas: 1
    proxy:
      replicas: 1
    backup:
      schedule: "0 * * * *"
    storageClassName: local-path
    storageSize: 2Gi
    mysqlConfig:
      mysqld:
        innodb_buffer_pool_size: "128M"
      galera:
        wsrep_provider_options:
          gcache.size: "128M"
          gcomm.thread_prio: "other:0"
  memcached:
    replicas: 1
  api:
    ingress:
      fqdn: "keystone.yaook.cloud"
      port: 32443
    replicas: 1
  keystoneConfig:
    token:
      expiration: 86400
  region:
    name: YaookRegion
  issuerRef:
    name: yaook-internal
  targetRelease: "2025.1"
---
# -----------------------------------------------------------------------------
# 3) Glance  (File-Backend auf local-path – KEIN Ceph)
# -----------------------------------------------------------------------------
# PoC ohne Ceph: File-Backend auf local-path-PVC. Single glance-api (replicas: 1)
# ist mit RWO ok; mehrere Replicas braeuchten RWX (NFS o.ae.).
apiVersion: yaook.cloud/v1
kind: GlanceDeployment
metadata:
  name: glance
  namespace: default
spec:
  keystoneRef:
    name: keystone
  database:
    replicas: 1
    proxy:
      replicas: 1
    backup:
      schedule: "0 * * * *"
    storageClassName: local-path
    storageSize: 2Gi
    mysqlConfig:
      mysqld:
        innodb_buffer_pool_size: "128M"
      galera:
        wsrep_provider_options:
          gcache.size: "128M"
          gcomm.thread_prio: "other:0"
  memcached:
    replicas: 1
  api:
    replicas: 1
    ingress:
      fqdn: "glance.yaook.cloud"
      port: 32443
  glanceConfig:
    glance_store:
      default_store: "file"
  backends:
    file:
      storageSize: 10Gi
      storageClassName: glance-static
  region:
    name: YaookRegion
  issuerRef:
    name: yaook-internal
  targetRelease: "2025.1"
---
# -----------------------------------------------------------------------------
# 4) Neutron (OVN, flat physnet1)  (unverändert + Hinweis)
# -----------------------------------------------------------------------------
# WICHTIG fuer VM-Netzanbindung: unter setup.ovn.controller.configTemplates ist
# aktuell KEIN Bridge-Mapping gesetzt. Fuer ein flat-Provider-Netz auf physnet1
# muss der OVN-Controller-Node 'ovn-bridge-mappings=physnet1:br-ex' kennen und
# 'br-ex' am Host existieren. Sonst bekommt keine Instanz Konnektivitaet.
apiVersion: yaook.cloud/v1
kind: NeutronDeployment
metadata:
  name: neutron
  namespace: default
spec:
  api:
    ingress:
      fqdn: "neutron.yaook.cloud"
      port: 32443
    replicas: 1
  database:
    backup:
      schedule: "0 * * * *"
    proxy:
      replicas: 1
    replicas: 1
    storageClassName: local-path
    storageSize: 2Gi
    mysqlConfig:
      mysqld:
        innodb_buffer_pool_size: "128M"
      galera:
        wsrep_provider_options:
          gcache.size: "128M"
          gcomm.thread_prio: "other:0"
  issuerRef:
    name: yaook-internal
  keystoneRef:
    name: keystone
  messageQueue:
    replicas: 1
    storageClassName: local-path
    storageSize: 2Gi
  memcached:
    replicas: 1
  neutronConfig: {}
  neutronML2Config:
    ml2_type_flat:
      flat_networks:
      - physnet1
  novaRef:
    name: nova
  region:
    name: YaookRegion
  setup:
    ovn:
      northboundOVSDB:
        replicas: 1
        backup:
          schedule: 0 12 * * *
        storageClassName: local-path
        storageSize: 2Gi
      northd: {}
      southboundOVSDB:
        ovnRelay:
          replicas: 1
        replicas: 1
        backup:
          schedule: 0 12 * * *
        storageClassName: local-path
        storageSize: 2Gi
      controller:
        # z.B. Bridge-Mapping fuer physnet1 hier ergaenzen:
        # configTemplates:
        #   - nodeSelectors:
        #       - matchLabels: {}
        #     ovnControllerConfig:
        #       ovn-bridge-mappings: "physnet1:br-ex"
        configTemplates: []
  targetRelease: "2025.1"
---
# -----------------------------------------------------------------------------
# 5) Nova  (unverändert + KVM-Hinweis)
# -----------------------------------------------------------------------------
# virt_type: qemu = Software-Emulation (langsam, laeuft ueberall).
# Fuer echtes KVM: virt_type: kvm + /dev/kvm am Node + Nested-Virt aktiv.
apiVersion: yaook.cloud/v1
kind: NovaDeployment
metadata:
  name: nova
  namespace: default
spec:
  keystoneRef:
    name: keystone
  database:
    api:
      replicas: 1
      proxy:
        replicas: 1
      backup:
        schedule: "0 * * * *"
      storageClassName: local-path
      storageSize: 2Gi
      mysqlConfig:
        mysqld:
          innodb_buffer_pool_size: "128M"
        galera:
          wsrep_provider_options:
            gcache.size: "128M"
            gcomm.thread_prio: "other:0"
    placement:
      replicas: 1
      proxy:
        replicas: 1
      backup:
        schedule: "0 * * * *"
      storageClassName: local-path
      storageSize: 2Gi
      mysqlConfig:
        mysqld:
          innodb_buffer_pool_size: "128M"
        galera:
          wsrep_provider_options:
            gcache.size: "128M"
            gcomm.thread_prio: "other:0"
    cell0:
      replicas: 1
      proxy:
        replicas: 1
      backup:
        schedule: "0 * * * *"
      storageClassName: local-path
      storageSize: 2Gi
      mysqlConfig:
        mysqld:
          innodb_buffer_pool_size: "128M"
        galera:
          wsrep_provider_options:
            gcache.size: "128M"
            gcomm.thread_prio: "other:0"
    cell1:
      replicas: 1
      proxy:
        replicas: 1
      backup:
        schedule: "0 * * * *"
      storageClassName: local-path
      storageSize: 2Gi
      mysqlConfig:
        mysqld:
          innodb_buffer_pool_size: "128M"
        galera:
          wsrep_provider_options:
            gcache.size: "128M"
            gcomm.thread_prio: "other:0"
  eviction: {}
  messageQueue:
    cell1:
      replicas: 1
      storageClassName: local-path
      storageSize: 2Gi
  memcached:
    replicas: 1
  api:
    replicas: 1
    ingress:
      fqdn: "nova.yaook.cloud"
      port: 32443
  conductor:
    replicas: 1
  placement:
    replicas: 1
    ingress:
      fqdn: "placement.yaook.cloud"
      port: 32443
  scheduler:
    replicas: 1
  vnc:
    ingress:
      fqdn: vnc.yaook.cloud
      port: 32443
    replicas: 1
  metadata:
    replicas: 1
  targetRelease: "2025.1"
  novaConfig: {}
  compute:
    configTemplates:
      - nodeSelectors:
          - matchLabels: {}
        novaComputeConfig:
          keystone_authtoken:
            os_region_name: YaookRegion
          libvirt:
            virt_type: qemu   # -> "kvm" fuer HW-Beschleunigung (s. Hinweis)
  issuerRef:
    name: yaook-internal
  region:
    name: YaookRegion
  databaseCleanup:
    schedule: "0 0 * * *"
---
# -----------------------------------------------------------------------------
# 6) Horizon  (unverändert – UI)
# -----------------------------------------------------------------------------
apiVersion: yaook.cloud/v1
kind: HorizonDeployment
metadata:
  name: horizon
  namespace: default
spec:
  keystoneRef:
    name: keystone
  replicas: 1
  ingress:
    fqdn: "horizon.yaook.cloud"
    port: 32443
  issuerRef:
    name: yaook-internal
  targetRelease: "2025.1"
---
# Eigene StorageClass OHNE Provisioner -> local-path fasst dieses PVC nicht an.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: glance-static
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: glance-images-pv
spec:
  capacity:
    storage: 20Gi                 # MUSS >= Glance backends.file.storageSize sein
  accessModes:
    - ReadWriteMany               # <-- das Etikett, das den RWX-PVC binden laesst
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: glance-static
  hostPath:
    path: /var/local-path-provisioner/glance-images
    type: DirectoryOrCreate       # kubelet legt das Verzeichnis an
